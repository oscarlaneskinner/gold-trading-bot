name: Inspect GLD Trade Memory

on:
  workflow_dispatch:

jobs:
  inspect-memory:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Inspect persistent memory
        run: python inspect_trade_memory.py
