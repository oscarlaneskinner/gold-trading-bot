name: Run GLD Focused Sizing Study

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  focused-sizing:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Run focused sizing study
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python focused_sizing_study.py

      - name: Commit research reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/focused_sizing_study.json
          git add reports/focused_sizing_study_folds.csv

          if git diff --cached --quiet; then
            echo "No focused-sizing report changes to commit."
          else
            git commit -m "Update GLD focused sizing study"
            git push
          fi
