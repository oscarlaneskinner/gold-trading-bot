name: Train AI Trading Model v3

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 0"

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train and validate model
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python train_model.py

      - name: Run backtest
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python backtest.py

      - name: Commit model and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add models/model.pkl models/model_metadata.json reports/model_metrics.json reports/backtest_metrics.json

          if [ -f models/model_previous.pkl ]; then
            git add models/model_previous.pkl
          fi

          if git diff --cached --quiet; then
            echo "No model or report changes to commit."
          else
            git commit -m "Weekly AI model retraining"
            git push
          fi
