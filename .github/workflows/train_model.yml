name: Train AI Trading Model v3

on:
  # Allows manual testing from the Actions page.
  workflow_dispatch:

  # Every Sunday at 2:00 PM UTC.
  # During daylight-saving time, this is 10:00 AM Eastern.
  schedule:
    - cron: "0 14 * * 0"

jobs:
  train-model:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train AI model
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python train_model.py

      - name: Save trained model and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add models/model.pkl

          if [ -f reports/model_metrics.json ]; then
            git add reports/model_metrics.json
          fi

          if git diff --cached --quiet; then
            echo "No model or report changes to commit."
          else
            git commit -m "Weekly AI model retraining"
            git push
          fi
