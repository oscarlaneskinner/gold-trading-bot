name: Test Championship Market Scanner v1
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
jobs:
  test-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements_championship_scanner_v1.txt
      - run: python test_championship_market_scanner_v1.py
