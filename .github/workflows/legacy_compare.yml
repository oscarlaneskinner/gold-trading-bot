name: Legacy Bot Comparison

on:
  workflow_dispatch:

  schedule:
    - cron: "15 14 * * 1-5"

permissions:
  contents: write

jobs:
  compare-legacy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_legacy.txt

      - name: Install legacy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_legacy.txt

      - name: Run legacy comparison
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python legacy_compare.py

      - name: Commit comparison report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/legacy_signals.csv

          if git diff --cached --quiet; then
            echo "No comparison changes to commit."
          else
            git commit -m "Update legacy bot comparison"
            git push
          fi
