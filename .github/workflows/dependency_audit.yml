name: Audit GLD Python Dependencies

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Audit dependency declarations
        run: python audit_dependencies.py
