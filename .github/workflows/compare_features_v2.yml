name: Compare GLD Feature Set v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compare-feature-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Compare feature set v2
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python compare_features_v2.py

      - name: Commit research reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/feature_v2_model_comparison.json
          git add reports/feature_v2_model_comparison_folds.csv

          if git diff --cached --quiet; then
            echo "No feature-v2 changes to commit."
          else
            git commit -m "Update GLD feature-v2 comparison"
            git push
          fi
