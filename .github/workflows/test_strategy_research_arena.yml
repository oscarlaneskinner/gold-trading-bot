name: Test UT Strategy Research Arena

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-arena:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_strategy_arena.txt
      - run: python test_strategy_research_arena.py
