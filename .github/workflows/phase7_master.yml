name: Run GLD Phase 7 Master Workflow

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  phase7-master:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt
      - name: Run core regression tests
        run: python run_core_regression_tests.py
      - name: Run Phase 7 integration test
        run: python test_phase7_complete.py
      - name: Create baseline snapshot
        run: python create_baseline_metrics.py
      - name: Build Strategy Laboratory
        run: python run_phase7_lab.py
      - name: Save reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/strategy_baseline_metrics.json reports/phase7_strategy_lab.json
          if git diff --cached --quiet; then
            echo "No Phase 7 changes."
          else
            git commit -m "Complete GLD Phase 7 Strategy Laboratory"
            git push
          fi
