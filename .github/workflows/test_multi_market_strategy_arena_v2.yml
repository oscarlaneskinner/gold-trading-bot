name: Test UT Multi-Market Strategy Arena v2
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
jobs:
  test-arena-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_multi_market_arena_v2.txt
      - run: python test_multi_market_strategy_arena_v2.py
