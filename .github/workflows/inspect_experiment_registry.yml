name: Inspect GLD Experiment Registry

on:
  workflow_dispatch:

jobs:
  inspect-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Inspect experiment registry
        run: python inspect_experiment_registry.py
