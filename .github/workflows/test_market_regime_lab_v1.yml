name: Test Market Regime Lab v1

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-regime-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_market_regime_lab_v1.txt
      - run: python test_market_regime_lab_v1.py
