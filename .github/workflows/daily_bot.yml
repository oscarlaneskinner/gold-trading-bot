name: Daily AI Trading Bot v4

on:
  workflow_dispatch:

  schedule:
    # Weekdays at 10:05 AM Eastern during daylight-saving time.
    - cron: "5 14 * * 1-5"

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper-trading bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python daily_bot.py

      - name: Save decision and trade logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f logs/decisions.csv ]; then
            git add logs/decisions.csv
          fi

          if [ -f logs/trades.csv ]; then
            git add logs/trades.csv
          fi

          if git diff --cached --quiet; then
            echo "No new bot logs to commit."
          else
            git commit -m "Update daily bot logs"
            git push
          fi