name: Daily AI Trading Bot v4

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Run paper-trading bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          POSITION_PERCENT: "0.10"
        run: python daily_bot.py

      - name: Save logs and trade memory
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f logs/decisions.csv ]; then
            git add logs/decisions.csv
          fi

          if [ -f logs/trades.csv ]; then
            git add logs/trades.csv
          fi

          if [ -f data/trade_memory.sqlite3 ]; then
            git add data/trade_memory.sqlite3
          fi

          if git diff --cached --quiet; then
            echo "No new logs or trade-memory changes to commit."
          else
            git commit -m "Update daily bot logs and trade memory"
            git push
          fi
