name: Test Short Arena v2 Championship

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-short-arena:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_short_arena_v2.txt
      - run: python test_short_arena_v2.py
