name: Compare GLD Trade Quality Filters

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compare-trade-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Compare trade-quality policies
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python compare_trade_quality.py

      - name: Commit research reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/trade_quality_comparison.json
          git add reports/trade_quality_comparison_folds.csv

          if git diff --cached --quiet; then
            echo "No trade-quality report changes to commit."
          else
            git commit -m "Update GLD trade-quality comparison"
            git push
          fi
