name: Compare GLD AI Ensemble

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compare-ensemble:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Compare LightGBM and XGBoost ensembles
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python compare_ensemble.py

      - name: Commit ensemble reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ensemble_comparison.json
          git add reports/ensemble_comparison_folds.csv

          if git diff --cached --quiet; then
            echo "No ensemble-report changes to commit."
          else
            git commit -m "Update GLD ensemble comparison"
            git push
          fi
