name: Test UT Bot Championship Bundle

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-championship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python test_ut_championship_bundle.py
