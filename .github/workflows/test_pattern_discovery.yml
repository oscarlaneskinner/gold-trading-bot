name: Test GLD Pattern Discovery

on:
  workflow_dispatch:

jobs:
  test-patterns:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run offline pattern test
        run: python test_pattern_discovery.py
