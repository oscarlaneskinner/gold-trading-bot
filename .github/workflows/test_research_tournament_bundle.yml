name: Test Research Tournament Bundle

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tournament bundle test
        run: python test_research_tournament_bundle.py
