name: Build GLD Weekly Research Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 6"

permissions:
  contents: write

jobs:
  weekly-research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Generate weekly research report
        run: python weekly_research_report.py

      - name: Save weekly research reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f reports/weekly_research_report.json ]; then
            git add reports/weekly_research_report.json
          fi

          if [ -f reports/weekly_research_report.txt ]; then
            git add reports/weekly_research_report.txt
          fi

          if git diff --cached --quiet; then
            echo "No weekly research-report changes to commit."
          else
            git commit -m "Update GLD weekly research report"
            git push
          fi
