name: Test Research Command Center

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-command-center:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run offline command-center test
        run: python test_research_command_center.py
