name: Test UT Bot Championship Arena v3
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
jobs:
  test-arena-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_arena_v3.txt
      - run: python test_arena_v3.py
