name: Test UT Alternative Indicators Bundle

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-alternative-indicators:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python test_ut_alternative_indicators_bundle.py
