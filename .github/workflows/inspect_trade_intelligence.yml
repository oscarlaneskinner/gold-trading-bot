name: Inspect GLD Trade Intelligence

on:
  workflow_dispatch:

jobs:
  inspect-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Inspect intelligence database
        run: python inspect_trade_intelligence.py
