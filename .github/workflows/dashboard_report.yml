name: Build GLD Performance Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Generate read-only dashboard
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python dashboard_report.py

      - name: Save dashboard reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f reports/gld_dashboard.html ]; then
            git add reports/gld_dashboard.html
          fi

          if [ -f reports/gld_dashboard.json ]; then
            git add reports/gld_dashboard.json
          fi

          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update GLD performance dashboard"
            git push
          fi
