name: Build GLD Phase 7 Strategy Laboratory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-phase7:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt
      - run: python create_baseline_metrics.py
      - run: python run_phase7_lab.py
      - name: Save reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/strategy_baseline_metrics.json reports/phase7_strategy_lab.json
          if git diff --cached --quiet; then
            echo "No Phase 7 report changes."
          else
            git commit -m "Update GLD Phase 7 Strategy Laboratory"
            git push
          fi
