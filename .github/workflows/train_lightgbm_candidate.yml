name: Train GLD LightGBM Candidate

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-lightgbm:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_models.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_models.txt

      - name: Train LightGBM candidate
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python train_lightgbm_production.py

      - name: Commit candidate model and metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add models/lightgbm_model.pkl
          git add models/lightgbm_model_metadata.json
          git add reports/lightgbm_production_training.json

          if git diff --cached --quiet; then
            echo "No LightGBM candidate changes to commit."
          else
            git commit -m "Train GLD LightGBM paper candidate"
            git push
          fi
