name: Test Two-Bot Shadow Controller v1

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-shadow-controller:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_two_bot_shadow_controller_v1.txt
      - run: python test_two_bot_shadow_controller_v1.py
